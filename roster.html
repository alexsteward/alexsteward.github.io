<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster - The Dojo</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
</head>
<body class="roster">

    <!-- Navigation Buttons -->
    <div class="nav-buttons">
        <a href="index.html" class="nav-button">Home</a>
        <a href="about-us.html" class="nav-button">About Us</a>
        <a href="join-now.html" class="nav-button">Join Us</a>
    </div>

    <!-- Header Section -->
    <header>
        <h1 class="roster-header">The Dojo Roster</h1>
    </header>

    <!-- Roster Grid Section -->
    <main class="roster-grid">
        <!-- Player Entries -->
        <div class="player-entry">
            <img src="GrimZz0.png" alt="GrimZz0 Avatar" class="player-avatar">
            <span class="player-name">GrimZz0</span>
            <span class="player-rank">San-Kyū</span>
            <span class="player-position">#1 - 875</span>
        </div>

        <div class="player-entry">
            <img src="ZackSlays.png" alt="ZackSlays Avatar" class="player-avatar">
            <span class="player-name">ZackSlays</span>
            <span class="player-rank">Shichi-kyū</span>
            <span class="player-position">#2 - 445</span>
        </div>

        <div class="player-entry">
            <img src="Taco_The_Mexican.png" alt="Taco_The_Mexican Avatar" class="player-avatar">
            <span class="player-name">Taco_The_Mexican</span>
            <span class="player-rank">Hachi-kyū</span>
            <span class="player-position">#3 - 375</span>
        </div>

        <div class="player-entry">
            <img src="PNTX28.png" alt="PNTX28 Avatar" class="player-avatar">
            <span class="player-name">PNTX28</span>
            <span class="player-rank">Probation</span>
            <span class="player-position">#4 - 0</span>
        </div>
    </main>

</body>
</html>
