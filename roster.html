<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster - The Dojo</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
</head>
<body class="roster">

    <!-- Navigation Buttons -->
    <div class="nav-buttons">
        <a href="index.html" class="nav-button">Home</a>
        <a href="about-us.html" class="nav-button">About Us</a>
        <a href="join-now.html" class="nav-button">Join Us</a>
    </div>

    <!-- Header Section -->
    <header>
        <h1 class="roster-header">The Dojo Roster</h1>
    </header>

    <!-- Roster Grid Section -->
    <main class="roster-grid">
        <!-- Sample Player Entry (Repeat this div for each player) -->
        <div class="player-entry">
            <img src="path/to/player-avatar.png" alt="Player Avatar" class="player-avatar">
            <span class="player-name">PlayerName</span>
            <span class="player-rank">Master</span>
            <span class="player-position">#1</span>
        </div>
        <!-- Add more player entries here -->
    </main>
