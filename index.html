<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dojo</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Include Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="dojo1.png" alt="Dojo Image 1" class="dojo-image">
        <h1>The Dojo</h1>
        <img src="dojo2.png" alt="Dojo Image 2" class="dojo-image">
    </header>
    <main>
        <section class="content">
            <div class="column left">
                <h2>About Us</h2>
                <div class="image-container">
                    <img src="react1.png" alt="About Us Image">
                </div>
                <button class="category-button">About Us</button> <!-- Button added -->
            </div>
            <div class="column middle">
                <h2>Getting Started</h2>
                <div class="image-container">
                    <img src="react1.png" alt="Getting Started Image">
                </div>
                <button class="category-button">Getting Started</button> <!-- Button added -->
            </div>
            <div class="column right">
                <h2>Roster</h2>
                <div class="image-container">
                    <img src="react1.png" alt="Roster Image">
                </div>
                <button class="category-button">Roster</button> <!-- Button added -->
            </div>
        </section>
    </main>
</body>
</html>
