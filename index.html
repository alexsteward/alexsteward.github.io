<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dojo</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Include Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>The Dojo</h1>
    </header>
    <main>
        <section class="content">
            <div class="column left"> <!-- Add 'left' class -->
                <h2>About Us</h2>
                <div class="image-container">
                    <img src="react1.png" alt="About Us Image">
                </div>
            </div>
            <div class="column middle"> <!-- Add 'middle' class -->
                <h2>Getting Started</h2>
                <div class="image-container">
                    <img src="react1.png" alt="Getting Started Image">
                </div>
            </div>
            <div class="column right"> <!-- Add 'right' class -->
                <h2>Roster</h2>
                <div class="image-container">
                    <img src="react1.png" alt="Roster Image">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
